function calcSum(item,dataMap){
  let own=0;
  if(item.prisSum!=null&&!item.children)return item.prisSum;
  if(item.antal!=null&&item.pris!=null)own=item.antal*item.pris;
  if(!item.children||!item.children.length)return own;
  return own+item.children.reduce((s,cid)=>{const c=dataMap.get(cid);return c?s+calcSum(c,dataMap):s;},0);
}
function calcActual(item,dataMap,receiptSums){
  const rs=receiptSums?receiptSums.get(item.id)||0:0;
  if(item.faktisk!=null&&item.faktisk!=='')return (Number(item.faktisk)||0)+rs;
  if(!item.children||!item.children.length)return rs;
  return rs+item.children.reduce((s,cid)=>{const c=dataMap.get(cid);return c?s+calcActual(c,dataMap,receiptSums):s;},0);
}
function calcSumTracked(item,dataMap,receiptSums){
  const hasOwn=(item.faktisk!=null&&item.faktisk!=='')||(receiptSums&&receiptSums.get(item.id));
  if(hasOwn)return calcSum(item,dataMap);
  if(!item.children||!item.children.length)return 0;
  return item.children.reduce((s,cid)=>{const c=dataMap.get(cid);return c?s+calcSumTracked(c,dataMap,receiptSums):s;},0);
}
function hasAnyActual(item,dataMap,receiptSums){
  if(item.faktisk!=null&&item.faktisk!=='')return true;
  if(receiptSums&&receiptSums.get(item.id))return true;
  if(!item.children)return false;
  return item.children.some(cid=>{const c=dataMap.get(cid);return c&&hasAnyActual(c,dataMap,receiptSums);});
}
function calcSCT(sc){return sc.items.reduce((s,it)=>s+(it.antal||0)*(it.pris||0),0)}

// ═══════════════════════════════════════════════════════════════════
// Searchable combobox for linking a receipt line to a budget post.
// Shows id + description + ancestor breadcrumb (mirroring the tree hierarchy).
// ═══════════════════════════════════════════════════════════════════
function SearchableLeafSelect({value,onChange,options,accent,placeholder='Søg efter post…'}){
  const [open,setOpen]=useState(false);
  const [query,setQuery]=useState('');
  const [hover,setHover]=useState(0);
  const [pos,setPos]=useState(null);
  const rootRef=useRef(null);
  const inputRef=useRef(null);
  const listRef=useRef(null);

  const calcPos=useCallback(()=>{
    if(!rootRef.current)return;
    const r=rootRef.current.getBoundingClientRect();
    const desiredH=320;
    const spaceBelow=window.innerHeight-r.bottom-12;
    const spaceAbove=r.top-12;
    const showAbove=spaceBelow<220&&spaceAbove>spaceBelow;
    const maxH=Math.max(140,Math.min(desiredH,showAbove?spaceAbove:spaceBelow));
    setPos({left:r.left,width:r.width,top:showAbove?r.top-4:r.bottom+4,showAbove,maxHeight:maxH});
  },[]);

  useEffect(()=>{
    const onDoc=e=>{
      if(rootRef.current&&rootRef.current.contains(e.target))return;
      if(listRef.current&&listRef.current.contains(e.target))return;
      setOpen(false);setQuery('');
    };
    document.addEventListener('mousedown',onDoc);
    return()=>document.removeEventListener('mousedown',onDoc);
  },[]);

  useEffect(()=>{
    if(!open){setPos(null);return;}
    calcPos();
    window.addEventListener('scroll',calcPos,true);
    window.addEventListener('resize',calcPos);
    return()=>{
      window.removeEventListener('scroll',calcPos,true);
      window.removeEventListener('resize',calcPos);
    };
  },[open,calcPos]);

  const current=options.find(o=>o.value===value);
  const q=query.trim().toLowerCase();
  const leafOpts=options.filter(o=>o.value!=='');
  const filtered=!q?leafOpts:leafOpts.filter(o=>{
    return o.value.toLowerCase().includes(q)
      ||(o.label||'').toLowerCase().includes(q)
      ||(o.path||'').toLowerCase().includes(q);
  });

  const pick=v=>{onChange(v);setOpen(false);setQuery('');setHover(0);};

  const onKey=e=>{
    if(e.key==='ArrowDown'){e.preventDefault();setHover(h=>Math.min(h+1,filtered.length));}
    else if(e.key==='ArrowUp'){e.preventDefault();setHover(h=>Math.max(h-1,0));}
    else if(e.key==='Enter'){
      e.preventDefault();
      if(hover===0)pick('');
      else if(filtered[hover-1])pick(filtered[hover-1].value);
    }
    else if(e.key==='Escape'){e.preventDefault();setOpen(false);setQuery('');}
  };

  useEffect(()=>{
    if(!open||!listRef.current)return;
    const el=listRef.current.querySelector('[data-hover="true"]');
    if(el)el.scrollIntoView({block:'nearest'});
  },[hover,open]);

  return(
    <div ref={rootRef} style={{position:'relative'}}>
      <div onClick={()=>{if(!open){setOpen(true);setHover(0);setTimeout(()=>inputRef.current?.focus(),0);}}}
        style={{padding:'5px 7px',border:'1px solid #e2e8f0',borderRadius:4,fontSize:11,fontFamily:'inherit',background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',gap:6,minHeight:26}}>
        {open?
          <input ref={inputRef} autoFocus value={query} onChange={e=>{setQuery(e.target.value);setHover(0);}} onKeyDown={onKey} onClick={e=>e.stopPropagation()} placeholder={placeholder}
            style={{border:'none',outline:'none',fontSize:11,fontFamily:'inherit',background:'transparent',flex:1,color:'#0f172a',minWidth:0}}/>
          :(current?.value
            ?<span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,minWidth:0,color:accent,fontWeight:600}}>
                <span style={{fontFamily:'monospace',fontSize:10,color:'#94a3b8',marginRight:6,fontWeight:400}}>{current.value}</span>{current.label}
              </span>
            :<span style={{flex:1,color:'#94a3b8'}}>— Ingen kobling —</span>)
        }
        <span style={{fontSize:9,color:'#94a3b8',flexShrink:0}}>{open?'▲':'▼'}</span>
      </div>
      {open&&pos&&(
        <div ref={listRef} style={{position:'fixed',left:pos.left,width:pos.width,top:pos.top,maxHeight:pos.maxHeight,transform:pos.showAbove?'translateY(-100%)':'none',zIndex:9999,background:'white',border:'1px solid #e2e8f0',borderRadius:6,boxShadow:'0 8px 24px rgba(0,0,0,0.14)',overflowY:'auto'}}>
          <div onClick={()=>pick('')}
            data-hover={hover===0}
            style={{padding:'8px 10px',fontSize:11,cursor:'pointer',color:'#64748b',background:hover===0?'#f1f5f9':'white',borderBottom:'1px solid #f1f5f9',fontStyle:'italic'}}
            onMouseEnter={()=>setHover(0)}>
            — Ingen kobling —
          </div>
          {filtered.length===0?(
            <div style={{padding:'16px 10px',fontSize:11,color:'#94a3b8',textAlign:'center'}}>Ingen match</div>
          ):filtered.map((o,i)=>{
            const isSel=o.value===value;
            const isHov=hover===i+1;
            const lvlStyle={
              1:{fw:700,fs:14,color:'#0f172a',bg:'#f1f5f9'},
              2:{fw:700,fs:13,color:'#1e293b',bg:'#f8fafc'},
              3:{fw:600,fs:13,color:'#334155',bg:'white'},
              4:{fw:500,fs:12,color:'#475569',bg:'white'},
              5:{fw:400,fs:12,color:'#64748b',bg:'white'},
            }[o.level]||{fw:400,fs:12,color:'#64748b',bg:'white'};
            const indent=Math.max(0,(o.level-1))*12;
            const rowBg=isSel?'#dbeafe':isHov?'#eff6ff':lvlStyle.bg;
            return(
              <div key={o.value} data-hover={isHov} onClick={()=>pick(o.value)}
                style={{padding:'6px 10px 6px '+(10+indent)+'px',cursor:'pointer',background:rowBg,borderBottom:'1px solid #f1f5f9',borderLeft:o.level>=2?'2px solid '+(o.level===2?'#cbd5e1':o.level===3?'#e2e8f0':'#f1f5f9'):'2px solid transparent'}}
                onMouseEnter={()=>setHover(i+1)}>
                <div style={{display:'flex',alignItems:'baseline',gap:8}}>
                  <span style={{fontFamily:'monospace',fontSize:10,color:'#94a3b8',flexShrink:0,minWidth:58}}>{o.value}</span>
                  <span style={{fontSize:lvlStyle.fs,fontWeight:lvlStyle.fw,color:lvlStyle.color,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{o.label}</span>
                </div>
                {o.path&&<div style={{fontSize:10,color:'#94a3b8',marginTop:1,marginLeft:66,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontStyle:'italic'}}>{o.path}</div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function SplitDialog({line,onClose,onSplit,accent}){
  const total=Number(line.amount)||0;
  const [mode,setMode]=useState('evenly');
  const [parts,setParts]=useState(2);
  const [customAmount,setCustomAmount]=useState('');
  const customNum=Number(customAmount)||0;
  const remainder=Math.max(0,total-customNum);
  const canSplit=mode==='evenly'?(parts>=2&&parts<=50):(customNum>0&&customNum<=total);
  return(
    <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.4)',zIndex:600,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={onClose}>
      <div style={{background:'white',borderRadius:12,padding:20,width:440,maxWidth:'100%',boxShadow:'0 8px 32px rgba(0,0,0,0.2)'}} onClick={e=>e.stopPropagation()}>
        <h3 style={{fontSize:15,fontWeight:700,color:'#0f172a',marginBottom:4}}>Del linje</h3>
        <div style={{fontSize:12,color:'#64748b',marginBottom:14}}>{line.desc||<em>Ingen beskrivelse</em>} — <strong style={{color:'#0f172a'}}>{total.toLocaleString('da-DK')} kr</strong></div>

        <label style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',border:'1px solid '+(mode==='evenly'?accent:'#e2e8f0'),borderRadius:8,cursor:'pointer',marginBottom:8,background:mode==='evenly'?'#f0f9ff':'white'}}>
          <input type="radio" name="splitmode" checked={mode==='evenly'} onChange={()=>setMode('evenly')}/>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:'#0f172a',marginBottom:4}}>Del i lige store dele</div>
            <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'#475569'}}>
              <button type="button" onClick={()=>setParts(Math.max(2,parts-1))} disabled={mode!=='evenly'||parts<=2} style={{width:24,height:24,borderRadius:4,border:'1px solid #e2e8f0',background:'white',cursor:'pointer',fontSize:14,fontWeight:600,fontFamily:'inherit'}}>−</button>
              <input type="number" min="2" max="50" value={parts} onChange={e=>setParts(Math.max(2,Math.min(50,parseInt(e.target.value,10)||2)))} disabled={mode!=='evenly'} onClick={e=>{e.stopPropagation();setMode('evenly')}}
                style={{width:50,padding:'3px 6px',border:'1px solid #e2e8f0',borderRadius:4,fontSize:12,fontFamily:'inherit',textAlign:'center',outline:'none'}}/>
              <button type="button" onClick={()=>setParts(Math.min(50,parts+1))} disabled={mode!=='evenly'||parts>=50} style={{width:24,height:24,borderRadius:4,border:'1px solid #e2e8f0',background:'white',cursor:'pointer',fontSize:14,fontWeight:600,fontFamily:'inherit'}}>+</button>
              <span style={{marginLeft:6,color:'#94a3b8'}}>→ {parts} × {(total/parts).toLocaleString('da-DK',{maximumFractionDigits:2})} kr</span>
            </div>
          </div>
        </label>

        <label style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',border:'1px solid '+(mode==='custom'?accent:'#e2e8f0'),borderRadius:8,cursor:'pointer',marginBottom:14,background:mode==='custom'?'#f0f9ff':'white'}}>
          <input type="radio" name="splitmode" checked={mode==='custom'} onChange={()=>setMode('custom')}/>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:'#0f172a',marginBottom:4}}>Skab ny linje med beløb</div>
            <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'#475569'}}>
              <input type="number" inputMode="decimal" min="0" step="any" value={customAmount} onChange={e=>setCustomAmount(e.target.value)} placeholder="kr" disabled={mode!=='custom'} onClick={e=>{e.stopPropagation();setMode('custom')}}
                style={{width:90,padding:'4px 7px',border:'1px solid #e2e8f0',borderRadius:4,fontSize:12,fontFamily:'inherit',textAlign:'right',outline:'none'}}/>
              <span style={{color:'#94a3b8'}}>kr på ny linje</span>
              {mode==='custom'&&customNum>0&&customNum<=total&&<span style={{marginLeft:'auto',fontSize:11,color:'#64748b'}}>rest: {remainder.toLocaleString('da-DK',{maximumFractionDigits:2})} kr</span>}
              {mode==='custom'&&customNum>total&&<span style={{marginLeft:'auto',fontSize:11,color:'#dc2626'}}>Større end total!</span>}
            </div>
          </div>
        </label>

        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button onClick={onClose} style={{padding:'7px 14px',border:'1px solid #e2e8f0',background:'white',color:'#475569',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>Annuller</button>
          <button disabled={!canSplit}
            onClick={()=>{
              if(mode==='evenly')onSplit(parts,null);
              else onSplit(null,customNum);
            }}
            style={{padding:'7px 14px',border:'none',background:canSplit?accent:'#cbd5e1',color:'white',borderRadius:6,cursor:canSplit?'pointer':'not-allowed',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>Del</button>
        </div>
      </div>
    </div>
  );
}

// AUTH GATE
// ═══════════════════════════════════════════════════════════════════
function LoginScreen(){
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [mode,setMode]=useState('signin'); // 'signin' | 'signup'
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null);
  const accent=TWEAK_DEFAULTS.accentColor;

  const submit=async e=>{
    e.preventDefault();
    setBusy(true);setMsg(null);
    try{
      if(mode==='signup'){
        const {error}=await supabase.auth.signUp({email,password});
        if(error)throw error;
        setMsg({kind:'ok',text:'Konto oprettet. Tjek din e-mail for en bekræftelseslink hvis det er aktiveret, ellers log ind nu.'});
      }else{
        const {error}=await supabase.auth.signInWithPassword({email,password});
        if(error)throw error;
      }
    }catch(err){
      setMsg({kind:'err',text:err.message||'Ukendt fejl'});
    }finally{setBusy(false)}
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'#f0f2f5'}}>
      <div style={{background:'white',borderRadius:14,boxShadow:'0 8px 32px rgba(0,0,0,0.08)',padding:32,width:'100%',maxWidth:380}}>
        <h1 style={{fontSize:24,fontWeight:700,color:'#0f172a',letterSpacing:'-0.02em',marginBottom:4}}>Projekt budget</h1>
        <p style={{color:'#64748b',fontSize:13,marginBottom:22}}>{mode==='signup'?'Opret en konto':'Log ind på din konto'}</p>
        <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:10}}>
          <label style={{display:'flex',flexDirection:'column',gap:4}}>
            <span style={{fontSize:10,fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.05em'}}>E-mail</span>
            <input type="email" autoComplete="email" required value={email} onChange={e=>setEmail(e.target.value)}
              style={{padding:'9px 11px',border:'1px solid #e2e8f0',borderRadius:7,fontSize:14,fontFamily:'inherit',outline:'none'}}/>
          </label>
          <label style={{display:'flex',flexDirection:'column',gap:4}}>
            <span style={{fontSize:10,fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.05em'}}>Adgangskode</span>
            <input type="password" autoComplete={mode==='signup'?'new-password':'current-password'} required minLength={6} value={password} onChange={e=>setPassword(e.target.value)}
              style={{padding:'9px 11px',border:'1px solid #e2e8f0',borderRadius:7,fontSize:14,fontFamily:'inherit',outline:'none'}}/>
          </label>
          {msg&&<div style={{fontSize:12,padding:'8px 10px',borderRadius:6,background:msg.kind==='ok'?'#f0fdf4':'#fef2f2',color:msg.kind==='ok'?'#166534':'#b91c1c'}}>{msg.text}</div>}
          <button type="submit" disabled={busy}
            style={{marginTop:4,padding:'10px 14px',border:'none',borderRadius:7,background:accent,color:'white',fontSize:14,fontWeight:600,fontFamily:'inherit',cursor:busy?'wait':'pointer',opacity:busy?.7:1}}>
            {busy?'…':(mode==='signup'?'Opret konto':'Log ind')}
          </button>
        </form>
        <button onClick={()=>{setMode(mode==='signin'?'signup':'signin');setMsg(null)}}
          style={{marginTop:14,border:'none',background:'transparent',color:accent,cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>
          {mode==='signin'?'Ingen konto? Opret en':'Har du en konto? Log ind'}
        </button>
        {(SUPABASE_URL.includes('YOUR-PROJECT')||SUPABASE_ANON_KEY.includes('YOUR_ANON'))&&
          <div style={{marginTop:18,padding:'8px 10px',borderRadius:6,background:'#fffbeb',border:'1px solid #fde68a',fontSize:11,color:'#92400e',lineHeight:1.5}}>
            ⚠ Supabase-konfiguration mangler. Åbn Byggebudget.html og udfyld <code>SUPABASE_URL</code> og <code>SUPABASE_ANON_KEY</code> øverst i scriptet.
          </div>}
      </div>
    </div>
  );
}

// ROOT — routes between LoginScreen and BudgetApp
// ═══════════════════════════════════════════════════════════════════
function App(){
  const [session,setSession]=useState(null);
  const [checking,setChecking]=useState(true);
  useEffect(()=>{
    supabase.auth.getSession().then(({data})=>{setSession(data.session);setChecking(false)});
    const {data:{subscription}}=supabase.auth.onAuthStateChange((_e,s)=>setSession(s));
    return()=>subscription.unsubscribe();
  },[]);
  if(checking)return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'#64748b',fontSize:13}}>Indlæser…</div>;
  if(!session)return <LoginScreen/>;
  return <BudgetApp session={session} key={session.user.id}/>;
}

// ═══════════════════════════════════════════════════════════════════
// BUDGET APP (the original UI, now backed by Supabase)
// ═══════════════════════════════════════════════════════════════════
function BudgetApp({session}){
  const userId=session.user.id;
  const userEmail=session.user.email;

  const [data,setData]=useState([]);
  const [subCalcs,setSubCalcs]=useState([]);
  const [categories,setCategories]=useState(DEFAULT_CATEGORIES);
  const [receipts,setReceipts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [loadError,setLoadError]=useState(null);
  const hydratedRef=useRef(false);

  const [viewReceipt,setViewReceipt]=useState(null);
  const [analyzing,setAnalyzing]=useState(null);
  const [detailLevel,setDetailLevel]=useState(()=>{const s=localStorage.getItem('byggebudget_level');return s?parseInt(s):5;});
  const [collapsed,setCollapsed]=useState(new Set());
  const [selectedId,setSelectedId]=useState(null);
  const [editingCell,setEditingCell]=useState(null);
  const [editingLink,setEditingLink]=useState(null);
  const [activeTab,setActiveTab]=useState('budget');
  const [oversigtFilter,setOversigtFilter]=useState('all');
  const [kobView,setKobView]=useState('liste'); // 'liste' | 'galleri'
  const [subcalcFor,setSubcalcFor]=useState(null); // id of row whose subcalc picker is open
  const [editFaserOpen,setEditFaserOpen]=useState(false);
  const [dragId,setDragId]=useState(null);
  const [dragOver,setDragOver]=useState({id:null,side:null});
  const [budgetSearch,setBudgetSearch]=useState('');
  const [searchLeavesOnly,setSearchLeavesOnly]=useState(false);
  const [kobStoreFilter,setKobStoreFilter]=useState('');
  const [splitFor,setSplitFor]=useState(null); // {rid, lid} when split modal is open
  const [toast,setToast]=useState(null);
  const [tweaks,setTweaks]=useState(TWEAK_DEFAULTS);
  const [tweaksVisible,setTweaksVisible]=useState(false);
  const [expandedCats,setExpandedCats]=useState(new Set());
  const [stuckL2,setStuckL2]=useState(new Set());
  const [isMobile,setIsMobile]=useState(window.innerWidth<=700);
  const tableRef=useRef(null);
  const stickyTopRef=useRef(null);
  const [stickyHeaderH,setStickyHeaderH]=useState(128);
  useEffect(()=>{
    if(!stickyTopRef.current)return;
    const el=stickyTopRef.current;
    const update=()=>setStickyHeaderH(el.offsetHeight);
    update();
    if(window.ResizeObserver){
      const ro=new ResizeObserver(update);
      ro.observe(el);
      return()=>ro.disconnect();
    }
    window.addEventListener('resize',update);
    return()=>window.removeEventListener('resize',update);
  },[activeTab,isMobile,budgetSearch]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500)};

  // Initial hydration from Supabase ───────────────────────────────
  useEffect(()=>{
    (async()=>{
      try{
        const {data:row,error}=await supabase.from('user_budgets').select('data, sub_calcs').eq('user_id',userId).maybeSingle();
        if(error)throw error;
        let nextData, nextSC, nextCats;
        if(row){
          nextData=Array.isArray(row.data)?row.data:createInitialData();
          const scRaw=row.sub_calcs;
          if(Array.isArray(scRaw)){
            // Legacy shape: sub_calcs is just an array. Categories fall back to defaults.
            nextSC=scRaw;
            nextCats=DEFAULT_CATEGORIES;
          }else{
            nextSC=Array.isArray(scRaw?.subCalcs)?scRaw.subCalcs:defaultSubCalcs();
            nextCats=Array.isArray(scRaw?.categories)&&scRaw.categories.length?scRaw.categories:DEFAULT_CATEGORIES;
          }
        }else{
          nextData=createInitialData();
          nextSC=defaultSubCalcs();
          nextCats=DEFAULT_CATEGORIES;
          const {error:insErr}=await supabase.from('user_budgets').insert({user_id:userId,data:nextData,sub_calcs:{subCalcs:nextSC,categories:nextCats}});
          if(insErr)throw insErr;
        }
        setData(nextData);
        setSubCalcs(nextSC);
        setCategories(nextCats);

        const {data:rs,error:rErr}=await supabase.from('receipts').select('*').eq('user_id',userId).order('created',{ascending:false});
        if(rErr)throw rErr;
        const withUrls=await Promise.all((rs||[]).map(async r=>{
          let imageUrl=null;
          if(r.image_path){
            const {data:u}=await supabase.storage.from('receipts').createSignedUrl(r.image_path,86400);
            imageUrl=u?.signedUrl||null;
          }
          return{id:r.id,image:imageUrl,imagePath:r.image_path,store:r.store||'',date:r.date||'',note:r.note||'',lines:r.lines||[],created:r.created?new Date(r.created).getTime():Date.now()};
        }));
        setReceipts(withUrls);
      }catch(e){
        console.error('Load failed:',e);
        setLoadError(e.message||'Kunne ikke hente data');
      }finally{
        setLoading(false);
        hydratedRef.current=true;
      }
    })();
  },[userId]);

  // Debounced save of budget + sub-calcs + categories whenever they change — silent.
  const saveTimer=useRef(null);
  useEffect(()=>{
    if(!hydratedRef.current)return;
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      const {error}=await supabase.from('user_budgets').upsert({user_id:userId,data,sub_calcs:{subCalcs,categories}});
      if(error){console.warn('Save failed:',error);showToast('Kunne ikke gemme: '+error.message);}
    },1200);
  },[data,subCalcs,categories,userId]);

  // Per-receipt debounced save ────────────────────────────────────
  const receiptsRef=useRef([]);
  useEffect(()=>{receiptsRef.current=receipts},[receipts]);
  const receiptTimers=useRef({});
  const saveReceiptDebounced=(rid)=>{
    clearTimeout(receiptTimers.current[rid]);
    receiptTimers.current[rid]=setTimeout(async()=>{
      const r=receiptsRef.current.find(x=>x.id===rid);
      if(!r)return;
      const {error}=await supabase.from('receipts').update({store:r.store,date:r.date||null,note:r.note,lines:r.lines}).eq('id',rid);
      if(error)console.warn('Receipt save failed:',error);
    },600);
  };

  useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<=700);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h)},[]);

  useEffect(()=>{
    const h=e=>{if(e.data?.type==='__activate_edit_mode')setTweaksVisible(true);if(e.data?.type==='__deactivate_edit_mode')setTweaksVisible(false);};
    window.addEventListener('message',h);try{window.parent.postMessage({type:'__edit_mode_available'},'*')}catch(_){}
    return()=>window.removeEventListener('message',h);
  },[]);
  useEffect(()=>{localStorage.setItem('byggebudget_level',detailLevel)},[detailLevel]);

  // Shrink image for AI and storage (cheaper + faster) ────────────
  const shrinkImage=(dataUrl,maxW=1400)=>new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1,maxW/img.width);
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      resolve(cv.toDataURL('image/jpeg',0.85));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });

  const blobToDataUrl=blob=>new Promise(res=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.readAsDataURL(blob)});
  const dataUrlToBlob=dataUrl=>fetch(dataUrl).then(r=>r.blob());

  const analyzeReceipt=async(receiptId)=>{
    const r=receiptsRef.current.find(x=>x.id===receiptId);if(!r)return;
    setAnalyzing(receiptId);
    try{
      const leafList=data.filter(d=>!d.children?.length&&d.level>=3).map(d=>'- '+d.id+': '+d.desc).join('\n');
      // Obtain base64 of the (shrunken) image
      let base64=r.imageData?.split(',')[1];
      if(!base64){
        const src=r.image;
        if(!src)throw new Error('Intet billede');
        const blob=await fetch(src).then(x=>x.blob());
        const dataUrl=await blobToDataUrl(blob);
        const shrunk=await shrinkImage(dataUrl);
        base64=shrunk.split(',')[1];
      }
      const {data:parsed,error}=await supabase.functions.invoke('analyze-receipt',{body:{imageBase64:base64,mediaType:'image/jpeg',leafList}});
      if(error)throw error;
      if(parsed?.error)throw new Error(parsed.error);

      let lines=(parsed.lines||[]).map((l,i)=>({id:'l'+Date.now()+'-'+i,desc:l.desc||'',amount:l.amount!=null?Number(l.amount):0,linkedId:l.suggestedId||''}));
      const ti=Number(parsed.totalIncl)||0;
      if(ti>0&&lines.length){
        const lineSum=lines.reduce((s,l)=>s+(l.amount||0),0);
        const ratio=lineSum/ti;
        if(ratio>0.75&&ratio<0.85){
          lines=lines.map(l=>({...l,amount:Math.round(l.amount*1.25*100)/100}));
        }
      }
      const linesStr=lines.map(l=>({...l,amount:l.amount?String(l.amount):''}));

      setReceipts(p=>p.map(x=>x.id!==receiptId?x:{...x,store:parsed.store||x.store||'',date:parsed.date||x.date,lines:linesStr.length?linesStr:x.lines}));
      saveReceiptDebounced(receiptId);
      showToast('Kvittering analyseret ('+(parsed.lines||[]).length+' linjer)');
    }catch(e){
      console.warn('Receipt analysis failed:',e);
      showToast('Kunne ikke analysere: '+(e.message||'ukendt fejl'));
    }finally{
      setAnalyzing(null);
    }
  };

  const addReceiptFromFile=(file,auto=true)=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=async()=>{
      try{
        const rid='r'+Date.now();
        const path=`${userId}/${rid}.jpg`;
        const shrunk=await shrinkImage(reader.result,1600);
        const blob=await dataUrlToBlob(shrunk);
        const {error:upErr}=await supabase.storage.from('receipts').upload(path,blob,{contentType:'image/jpeg',upsert:true});
        if(upErr)throw upErr;
        const today=new Date().toISOString().slice(0,10);
        const initialLines=[{id:'l0',desc:'',amount:'',linkedId:''}];
        const {error:dbErr}=await supabase.from('receipts').insert({id:rid,user_id:userId,image_path:path,store:'',date:today,note:'',lines:initialLines});
        if(dbErr)throw dbErr;
        const {data:u}=await supabase.storage.from('receipts').createSignedUrl(path,86400);
        const nr={id:rid,image:u?.signedUrl||shrunk,imageData:shrunk,imagePath:path,store:'',date:today,note:'',lines:initialLines,created:Date.now()};
        setReceipts(p=>[nr,...p]);
        setViewReceipt(rid);
        if(auto)setTimeout(()=>analyzeReceipt(rid),100);
      }catch(e){
        console.warn('Add receipt failed:',e);
        showToast('Kunne ikke tilføje kvittering: '+(e.message||'ukendt fejl'));
      }
    };
    reader.readAsDataURL(file);
  };

  const addManualReceipt=async()=>{
    try{
      const rid='r'+Date.now();
      const today=new Date().toISOString().slice(0,10);
      const initialLines=[{id:'l0',desc:'',amount:'',linkedId:''}];
      const {error}=await supabase.from('receipts').insert({id:rid,user_id:userId,image_path:null,store:'',date:today,note:'',lines:initialLines});
      if(error)throw error;
      const nr={id:rid,image:null,imageData:null,imagePath:null,store:'',date:today,note:'',lines:initialLines,created:Date.now()};
      setReceipts(p=>[nr,...p]);
      setViewReceipt(rid);
    }catch(e){
      console.warn('Manual receipt failed:',e);
      showToast('Kunne ikke oprette: '+(e.message||'ukendt fejl'));
    }
  };

  const deleteReceipt=async(rid)=>{
    const r=receiptsRef.current.find(x=>x.id===rid);
    setReceipts(p=>p.filter(x=>x.id!==rid));
    try{
      if(r?.imagePath)await supabase.storage.from('receipts').remove([r.imagePath]);
      await supabase.from('receipts').delete().eq('id',rid);
    }catch(e){console.warn('Delete failed:',e);}
  };

  const signOut=async()=>{await supabase.auth.signOut();};

  const dataMap=useMemo(()=>{const m=new Map();data.forEach(d=>m.set(d.id,d));return m},[data]);
  const receiptSums=useMemo(()=>{const m=new Map();receipts.forEach(r=>(r.lines||[]).forEach(l=>{if(l.linkedId&&l.amount){m.set(l.linkedId,(m.get(l.linkedId)||0)+(Number(l.amount)||0));}}));return m;},[receipts]);
  const subCalcMap=useMemo(()=>{const m=new Map();subCalcs.forEach(s=>m.set(s.id,s));return m},[subCalcs]);

  // Precompute per-row metrics once per data/receipt change. Reading from this map in the
  // render is O(1) instead of re-running recursive calcSum/calcActual for each visible row.
  const metricsById=useMemo(()=>{
    const m=new Map();
    data.forEach(d=>{
      const sum=calcSum(d,dataMap);
      const actual=calcActual(d,dataMap,receiptSums);
      const sumTracked=calcSumTracked(d,dataMap,receiptSums);
      const has=hasAnyActual(d,dataMap,receiptSums);
      m.set(d.id,{sum,actual,sumTracked,hasActual:has,diff:actual-sumTracked});
    });
    return m;
  },[data,dataMap,receiptSums]);
  const getM=id=>metricsById.get(id)||{sum:0,actual:0,sumTracked:0,hasActual:false,diff:0};

  // Sync subCalc prices into budget rows
  useEffect(()=>{
    if(!hydratedRef.current)return;
    let changed=false;
    const updated=data.map(d=>{
      if(d.subCalcRef){const sc=subCalcMap.get(d.subCalcRef);if(sc){const np=Math.round(calcSCT(sc));if(d.pris!==np){changed=true;return{...d,pris:np}}}}
      return d;
    });
    if(changed)setData(updated);
  },[subCalcs]);

  // Sticky level-2 detection
  useEffect(()=>{
    if(activeTab!=='budget')return;
    const onScroll=()=>{
      const stuck=new Set();
      document.querySelectorAll('[data-row-level="2"]').forEach(el=>{
        const id=el.getAttribute('data-row-id');
        const rect=el.getBoundingClientRect();
        const stickyTop=parseFloat(el.style.top)||0;
        if(Math.abs(rect.top-stickyTop)<3){
          const item=dataMap.get(id);
          if(item?.children?.length){
            const findLastDesc=(it)=>{
              if(!it.children||!it.children.length)return it;
              const lastChildId=it.children[it.children.length-1];
              const lastChild=dataMap.get(lastChildId);
              if(!lastChild)return it;
              if(collapsed.has(it.id))return it;
              return findLastDesc(lastChild);
            };
            const lastDesc=findLastDesc(item);
            const lastEl=document.querySelector('[data-row-id="'+lastDesc.id+'"]');
            if(lastEl){
              const lastRect=lastEl.getBoundingClientRect();
              if(lastRect.bottom<=rect.bottom+2) stuck.add(id);
            }
          }
        }
      });
      setStuckL2(prev=>{
        if(prev.size===stuck.size&&[...prev].every(id=>stuck.has(id)))return prev;
        return stuck;
      });
    };
    onScroll();
    window.addEventListener('scroll',onScroll,{passive:true});
    return()=>window.removeEventListener('scroll',onScroll);
  },[activeTab,dataMap,collapsed]);

  const toggleCollapse=id=>setCollapsed(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n});

  // When search is active:
  //   - tree mode (default): show matches + ancestors for context
  //   - leaves mode: show only the deepest matches (those with no matching descendant)
  const searchInfo=useMemo(()=>{
    const q=budgetSearch.trim().toLowerCase();
    if(!q)return null;
    const direct=new Set();
    data.forEach(d=>{if((d.desc||'').toLowerCase().includes(q))direct.add(d.id);});
    // Leaves: matches with no matching descendant
    const leaves=new Set();
    direct.forEach(id=>{
      const it=dataMap.get(id);
      let hasMatchingDesc=false;
      const walk=i=>{
        if(!i?.children||hasMatchingDesc)return;
        for(const cid of i.children){
          if(direct.has(cid)){hasMatchingDesc=true;return;}
          walk(dataMap.get(cid));
        }
      };
      walk(it);
      if(!hasMatchingDesc)leaves.add(id);
    });
    // Tree: matches + their ancestors
    const tree=new Set(direct);
    direct.forEach(id=>{
      let cur=dataMap.get(id);
      while(cur?.parent){cur=dataMap.get(cur.parent);if(!cur)break;tree.add(cur.id);}
    });
    return{direct,leaves,tree};
  },[budgetSearch,data,dataMap]);
  const searchMatches=searchInfo?(searchLeavesOnly?searchInfo.leaves:searchInfo.tree):null;

  const isVisible=item=>{
    if(searchMatches)return searchMatches.has(item.id);
    if(item.level>detailLevel)return false;
    let cur=item;while(cur.parent){if(collapsed.has(cur.parent))return false;cur=dataMap.get(cur.parent);if(!cur)break;}return true;
  };

  const getEffectiveKategori=(item)=>{
    if(item.kategori)return item.kategori;
    let cur=item;
    while(cur.parent){cur=dataMap.get(cur.parent);if(!cur)break;if(cur.kategori)return cur.kategori;}
    return '';
  };

  const lvl2StickyMap=useMemo(()=>{
    const m=new Map();let count=0;
    data.filter(isVisible).forEach(item=>{
      if(item.level===1){count=0;}
      if(item.level===2){m.set(item.id,count);count++;}
    });return m;
  },[data,detailLevel,collapsed]);

  const updateItem=(id,field,value)=>setData(p=>p.map(d=>d.id===id?{...d,[field]:value}:d));

  const addChild=parentId=>{
    const parent=dataMap.get(parentId);if(!parent||parent.level>=MAX_LEVEL)return;
    // Use a temp id so renumber will assign a proper sequential one
    const tmpId='_tmp_'+Date.now();
    const newItem={id:tmpId,level:parent.level+1,desc:'Ny post',parent:parentId,antal:0,pris:0,enhed:'stk',kategori:''};
    setData(prev=>{
      const u=prev.map(d=>d.id===parentId?{...d,children:[...(d.children||[]),tmpId]}:d);
      const pidx=u.findIndex(d=>d.id===parentId);let ins=pidx+1;
      while(ins<u.length&&u[ins].level>parent.level)ins++;
      u.splice(ins,0,newItem);
      return renumberApplied([...u]);
    });
  };

  const addTopLevel=()=>{
    const tmpId='_tmp_'+Date.now();
    const newItem={id:tmpId,level:1,desc:'Nyt hovedprojekt',children:[]};
    setData(prev=>renumberApplied([...prev,newItem]));
  };

  const deleteItem=id=>{
    const item=dataMap.get(id);if(!item)return;
    const rem=new Set();const collect=i=>{rem.add(i);const it=dataMap.get(i);if(it?.children)it.children.forEach(collect);};collect(id);
    setData(prev=>{
      let u=prev.filter(d=>!rem.has(d.id));
      if(item.parent)u=u.map(d=>d.id===item.parent?{...d,children:(d.children||[]).filter(c=>c!==id)}:d);
      return renumberApplied(u);
    });
    if(selectedId===id)setSelectedId(null);
  };

  // Renumber every row so IDs match visual order (1, 1.1, 1.1.1, …) and cascade-update
  // any receipt linkedIds. Returns the new data array. Mutates receipts via setReceipts.
  const renumberApplied=(transformed)=>{
    const idMap=new Map();
    const childCounter=new Map();
    transformed.forEach(item=>{
      let newId;
      if(item.level===1){
        const cnt=childCounter.get('__root__')||0;
        childCounter.set('__root__',cnt+1);
        newId=String(cnt+1);
      }else{
        const parentNewId=idMap.get(item.parent);
        if(!parentNewId){idMap.set(item.id,item.id);return;}
        const cnt=childCounter.get(item.parent)||0;
        childCounter.set(item.parent,cnt+1);
        newId=parentNewId+'.'+(cnt+1);
      }
      idMap.set(item.id,newId);
    });
    const renumbered=transformed.map(item=>{
      const ni=idMap.get(item.id);
      const np=item.parent?idMap.get(item.parent):undefined;
      const nc=item.children?item.children.map(c=>idMap.get(c)||c):undefined;
      return{...item,id:ni||item.id,...(item.parent?{parent:np||item.parent}:{}),...(item.children?{children:nc}:{})};
    });
    // Cascade rename to receipt linkedIds
    const currentReceipts=receiptsRef.current;
    let anyChanged=false;
    const newReceipts=currentReceipts.map(r=>{
      let changed=false;
      const newLines=(r.lines||[]).map(l=>{
        if(l.linkedId&&idMap.has(l.linkedId)){
          const mapped=idMap.get(l.linkedId);
          if(mapped!==l.linkedId){changed=true;return{...l,linkedId:mapped};}
        }
        return l;
      });
      if(changed){anyChanged=true;return{...r,lines:newLines};}
      return r;
    });
    if(anyChanged){
      setReceipts(newReceipts);
      newReceipts.forEach((r,i)=>{if(r!==currentReceipts[i])saveReceiptDebounced(r.id);});
    }
    return renumbered;
  };

  // Move an item up or down within its siblings (or within top-level items).
  // Keeps the flat data[] array order in sync so the visual order follows the children order.
  const moveItem=(id,dir)=>{
    setData(prev=>{
      const item=prev.find(d=>d.id===id);
      if(!item)return prev;
      // Reorder the sibling list
      let newSiblings;
      if(item.parent){
        const parent=prev.find(d=>d.id===item.parent);
        if(!parent?.children)return prev;
        const sibs=parent.children;
        const idx=sibs.indexOf(id);
        const tgt=dir==='up'?idx-1:idx+1;
        if(idx<0||tgt<0||tgt>=sibs.length)return prev;
        newSiblings=[...sibs];[newSiblings[idx],newSiblings[tgt]]=[newSiblings[tgt],newSiblings[idx]];
      }else{
        // Top-level reorder
        const topIds=prev.filter(d=>d.level===1).map(d=>d.id);
        const idx=topIds.indexOf(id);
        const tgt=dir==='up'?idx-1:idx+1;
        if(idx<0||tgt<0||tgt>=topIds.length)return prev;
        newSiblings=[...topIds];[newSiblings[idx],newSiblings[tgt]]=[newSiblings[tgt],newSiblings[idx]];
      }
      // Extract each sibling's subtree and reassemble in new order
      let u=[...prev];
      if(item.parent){
        u=u.map(d=>d.id===item.parent?{...d,children:newSiblings}:d);
      }
      const parentLevel=item.parent?(u.find(d=>d.id===item.parent).level):0;
      const subtreeStart=item.parent?(u.findIndex(d=>d.id===item.parent)+1):0;
      let subtreeEnd=subtreeStart;
      while(subtreeEnd<u.length&&u[subtreeEnd].level>parentLevel)subtreeEnd++;
      const region=u.slice(subtreeStart,subtreeEnd);
      // Group region into per-sibling subtrees
      const subtrees=new Map();
      let i=0;
      while(i<region.length){
        const s=region[i];
        if(s.level!==parentLevel+1){i++;continue;}
        let j=i+1;
        while(j<region.length&&region[j].level>s.level)j++;
        subtrees.set(s.id,region.slice(i,j));
        i=j;
      }
      const reordered=newSiblings.flatMap(sid=>subtrees.get(sid)||[]);
      return renumberApplied([...u.slice(0,subtreeStart),...reordered,...u.slice(subtreeEnd)]);
    });
  };

  // Move srcId to land just above/below destId among their common parent's children.
  // Destination must be a sibling (same parent) or they must both be top-level.
  const moveToPosition=(srcId,destId,side)=>{
    if(srcId===destId)return;
    const src=dataMap.get(srcId);
    const dest=dataMap.get(destId);
    if(!src||!dest)return;
    if(src.parent!==dest.parent)return;
    setData(prev=>{
      const parentId=src.parent;
      let siblings;
      if(parentId){
        const parent=prev.find(d=>d.id===parentId);
        if(!parent?.children)return prev;
        siblings=[...parent.children];
      }else{
        siblings=prev.filter(d=>d.level===1).map(d=>d.id);
      }
      const srcIdx=siblings.indexOf(srcId);
      if(srcIdx<0)return prev;
      siblings.splice(srcIdx,1);
      let destIdx=siblings.indexOf(destId);
      if(destIdx<0)return prev;
      if(side==='below')destIdx++;
      siblings.splice(destIdx,0,srcId);

      let u=[...prev];
      if(parentId)u=u.map(d=>d.id===parentId?{...d,children:siblings}:d);
      const parentLevel=parentId?u.find(d=>d.id===parentId).level:0;
      const subtreeStart=parentId?(u.findIndex(d=>d.id===parentId)+1):0;
      let subtreeEnd=subtreeStart;
      while(subtreeEnd<u.length&&u[subtreeEnd].level>parentLevel)subtreeEnd++;
      const region=u.slice(subtreeStart,subtreeEnd);
      const subtrees=new Map();
      let i=0;
      while(i<region.length){
        const s=region[i];
        if(s.level!==parentLevel+1){i++;continue;}
        let j=i+1;
        while(j<region.length&&region[j].level>s.level)j++;
        subtrees.set(s.id,region.slice(i,j));
        i=j;
      }
      const reordered=siblings.flatMap(sid=>subtrees.get(sid)||[]);
      return renumberApplied([...u.slice(0,subtreeStart),...reordered,...u.slice(subtreeEnd)]);
    });
  };

  const canMove=(id,dir)=>{
    const item=dataMap.get(id);
    if(!item)return false;
    if(item.parent){
      const parent=dataMap.get(item.parent);
      const sibs=parent?.children||[];
      const idx=sibs.indexOf(id);
      return dir==='up'?idx>0:idx>=0&&idx<sibs.length-1;
    }
    const topIds=data.filter(d=>d.level===1).map(d=>d.id);
    const idx=topIds.indexOf(id);
    return dir==='up'?idx>0:idx>=0&&idx<topIds.length-1;
  };

  // Paste handler ─────────────────────────────────────────────────
  const handlePaste=useCallback(e=>{
    if(activeTab!=='budget'||editingCell)return;
    const text=e.clipboardData?.getData('text/plain');
    if(!text||!text.includes('\t'))return;
    e.preventDefault();
    const lines=text.trim().split('\n').map(l=>l.split('\t'));
    const first=lines[0];
    const isHeader=first.some(c=>/^(gruppering|hjælpe|beskrivelse|kode|antal|pris|niveau|sum|kategori|prissummering|link)/i.test(c.trim()));
    const dataLines=isHeader?lines.slice(1):lines;
    const isExcelFormat=dataLines.some(cols=>/^\d+(\.\d+)*$/.test(cols[0]?.trim()));
    if(isExcelFormat){
      const newItems=[];const idSet=new Set(data.map(d=>d.id));
      dataLines.forEach(cols=>{
        if(cols.length<3)return;
        const grp=cols[0]?.trim();if(!grp)return;
        const desc=cols[2]?.trim()||'';const link=cols[3]?.trim()||'';
        const antal=cols[4]?parseDK(cols[4]):null;const pris=cols[5]?parseDK(cols[5]):null;
        const prisSum=cols[6]?parseDK(cols[6]):null;
        const level=grp.split('.').length;
        const parentId=grp.includes('.')?grp.substring(0,grp.lastIndexOf('.')):null;
        if(idSet.has(grp))return;idSet.add(grp);
        const item={id:grp,level,desc,parent:parentId||undefined,enhed:'',kategori:''};
        if(link)item.link=link;
        if(antal!=null&&pris!=null){item.antal=antal;item.pris=pris;}
        else if(prisSum!=null&&prisSum>0&&antal==null){item.prisSum=prisSum;}
        newItems.push(item);
      });
      if(!newItems.length)return;
      const childMap={};
      newItems.forEach(it=>{if(it.parent){if(!childMap[it.parent])childMap[it.parent]=[];childMap[it.parent].push(it.id);}});
      setData(prev=>{
        let u=[...prev];
        Object.entries(childMap).forEach(([pid,cids])=>{
          const ei=u.findIndex(d=>d.id===pid);
          if(ei>=0){const ex=u[ei].children||[];u[ei]={...u[ei],children:[...ex,...cids.filter(c=>!ex.includes(c))]};}
        });
        newItems.forEach(it=>{if(childMap[it.id])it.children=childMap[it.id];});
        newItems.forEach(item=>{
          if(u.find(d=>d.id===item.id))return;
          if(item.parent){const pidx=u.findIndex(d=>d.id===item.parent);if(pidx>=0){let ins=pidx+1;while(ins<u.length&&u[ins].level>u[pidx].level)ins++;u.splice(ins,0,item);}else u.push(item);}
          else u.push(item);
        });return[...u];
      });
      showToast(`${newItems.length} poster importeret`);
    } else {
      let parentId=selectedId;
      if(!parentId){const p=data.filter(d=>d.level<=3&&d.children);parentId=p.length?p[p.length-1].id:'1';}
      const parent=dataMap.get(parentId);if(!parent||parent.level>=MAX_LEVEL)return;
      const newItems=[];let idx=(parent.children||[]).length;
      dataLines.forEach(cols=>{if(cols.length<2)return;idx++;const nid=parentId+'.'+idx;
        newItems.push({id:nid,level:parent.level+1,desc:(cols[1]||cols[0]||'').trim(),parent:parentId,enhed:'',antal:parseDK(cols[3]),pris:parseDK(cols[4]),kategori:''});
      });
      if(!newItems.length)return;
      setData(prev=>{let u=prev.map(d=>d.id===parentId?{...d,children:[...(d.children||[]),...newItems.map(n=>n.id)]}:d);const pidx=u.findIndex(d=>d.id===parentId);let ins=pidx+1;while(ins<u.length&&u[ins].level>parent.level)ins++;u.splice(ins,0,...newItems);return[...u];});
      showToast(`${newItems.length} rækker indsat`);
    }
  },[activeTab,editingCell,selectedId,data,dataMap]);
  useEffect(()=>{document.addEventListener('paste',handlePaste);return()=>document.removeEventListener('paste',handlePaste)},[handlePaste]);

  const copyToClipboard=()=>{
    const vis=data.filter(isVisible);
    const header=['Gruppering','Hjælpe','Beskrivelse','Link','Antal','Pris','Prissummering','Enhed','Kategori'].join('\t');
    const rows=vis.map(item=>{
      const sum=calcSum(item,dataMap);
      return[item.id,item.parent||'',item.desc,item.link||'',item.antal!=null?item.antal:'',item.pris!=null?item.pris:'',sum,item.enhed||'',getEffectiveKategori(item)].join('\t');
    });
    navigator.clipboard.writeText(header+'\n'+rows.join('\n')).then(()=>showToast('Kopieret'));
  };

  const EditableCell=({id,field,value,numeric,align,decimals})=>{
    const isEd=editingCell?.id===id&&editingCell?.field===field;
    const[tmp,setTmp]=useState(String(value??''));
    useEffect(()=>{setTmp(String(value??''))},[value]);
    const formatter=decimals?fmt2:fmt;
    if(!isEd)return<span onClick={e=>{e.stopPropagation();setEditingCell({id,field});setTmp(value==null||value===''?'':String(value))}} style={{cursor:'text',display:'block',width:'100%',minHeight:18,textAlign:align||'left'}}>{numeric&&value!=null&&value!==''?formatter(value):(value??(numeric?<span style={{color:'#cbd5e1'}}>—</span>:''))}</span>;
    return<input autoFocus value={tmp} onChange={e=>setTmp(e.target.value)} onFocus={e=>e.target.select()} inputMode={numeric?'decimal':'text'}
      onBlur={()=>{

      style={{width:'100%',border:'2px solid '+tweaks.accentColor,borderRadius:4,padding:'2px 6px',fontSize:'inherit',fontFamily:'inherit',textAlign:align||'left',outline:'none',background:'white'}}/>;
  };

  const SelectCell=({id,field,value,options})=>(
    <select value={value||''} onChange={e=>updateItem(id,field,e.target.value)} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}
      style={{border:'none',background:'transparent',fontSize:11,color:'#475569',fontFamily:'inherit',cursor:'pointer',width:'100%',outline:'none',padding:0,margin:0,height:18,lineHeight:'18px',appearance:'none',WebkitAppearance:'none',MozAppearance:'none',boxSizing:'border-box',maxWidth:'100%'}}>
      {options.map(o=><option key={typeof o==='string'?o:o.value} value={typeof o==='string'?o:o.value}>{typeof o==='string'?(o||'—'):o.label}</option>)}
    </select>
  );

  const levelColors={
    1:{bg:'#1e293b',color:'#fff',fw:700,fs:14},
    2:{bg:'#e8eef6',color:'#1e293b',fw:700,fs:13},
    3:{bg:'#f1f5f9',color:'#334155',fw:600,fs:13},
    4:{bg:'#fafafa',color:'#475569',fw:400,fs:12},
    5:{bg:'#ffffff',color:'#64748b',fw:400,fs:12},
  };

  // These useMemo calls must run on every render (Rules of Hooks) — keep them above the early returns below.
  const catDetails=useMemo(()=>{
    const byCat={};
    data.forEach(d=>{
      if(d.children?.length)return;
      const cat=getEffectiveKategori(d)||'Ikke tildelt';
      if(!byCat[cat])byCat[cat]={sum:0,sumTracked:0,actual:0,leafIds:new Set()};
      const s=calcSum(d,dataMap);
      byCat[cat].sum+=s;
      byCat[cat].sumTracked+=calcSumTracked(d,dataMap,receiptSums);
      byCat[cat].actual+=calcActual(d,dataMap,receiptSums);
      byCat[cat].leafIds.add(d.id);
    });
    return Object.entries(byCat).map(([cat,{sum,sumTracked,actual,leafIds}])=>{
      const includeIds=new Set();
      leafIds.forEach(id=>{includeIds.add(id);let cur=dataMap.get(id);while(cur?.parent){includeIds.add(cur.parent);cur=dataMap.get(cur.parent);}});
      const rows=data.filter(d=>includeIds.has(d.id)).map(d=>{
        const catSum=(function subSum(item){if(!item.children||!item.children.length){return leafIds.has(item.id)?calcSum(item,dataMap):0;}return item.children.reduce((s,cid)=>{const c=dataMap.get(cid);return c?s+subSum(c):s;},0);})(d);
        const catAct=(function subAct(item){if(!item.children||!item.children.length){return leafIds.has(item.id)?calcActual(item,dataMap,receiptSums):0;}return item.children.reduce((s,cid)=>{const c=dataMap.get(cid);return c?s+subAct(c):s;},0);})(d);
        const catSumTracked=(function subST(item){if(!item.children||!item.children.length){return leafIds.has(item.id)&&hasAnyActual(item,dataMap,receiptSums)?calcSum(item,dataMap):0;}return item.children.reduce((s,cid)=>{const c=dataMap.get(cid);return c?s+subST(c):s;},0);})(d);
        const catHasAct=(function subHasAct(item){if(!item.children||!item.children.length){return leafIds.has(item.id)&&hasAnyActual(item,dataMap,receiptSums);}return item.children.some(cid=>{const c=dataMap.get(cid);return c&&subHasAct(c);});})(d);
        return{...d,catSum,catAct,catSumTracked,catHasAct,isLeafInCat:leafIds.has(d.id)};
      });
      const diff=actual-sumTracked;
      return{cat,sum,actual,diff,hasActual:rows.some(r=>r.catHasAct),rows};
    }).sort((a,b)=>a.cat.localeCompare(b.cat));
  },[data,dataMap,collapsed,receipts,receiptSums]);

  const scOptions=useMemo(()=>[{value:'',label:'— Ingen —'},...subCalcs.map(sc=>({value:sc.id,label:sc.name+' ('+fmt(Math.round(calcSCT(sc)))+' kr/'+sc.unit+')'}))],[subCalcs]);
  const catOptions=useMemo(()=>['',...categories],[categories]);

  const addCategory=()=>{
    let base='Ny fase',name=base,n=1;
    while(categories.includes(name)){n++;name=base+' '+n;}
    setCategories(p=>[...p,name]);
  };
  const renameCategory=(oldName,newName)=>{
    const trimmed=(newName||'').trim();

  const deleteCategory=(name)=>{

      ?'Slet fasen "'+name+'"? Den er brugt på nogle poster — deres fase bliver ryddet.'
      :'Slet fasen "'+name+'"?';

    setCategories(p=>p.filter(c=>c!==name));
    if(used)setData(p=>p.map(d=>d.kategori===name?{...d,kategori:''}:d));
  };

  if(loading)return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'#64748b',fontSize:13}}>Henter dit budget…</div>;
  if(loadError)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'white',borderRadius:12,padding:24,maxWidth:420,boxShadow:'0 4px 16px rgba(0,0,0,0.06)'}}>
        <h2 style={{fontSize:16,fontWeight:700,color:'#b91c1c',marginBottom:8}}>Kunne ikke hente data</h2>
        <p style={{fontSize:13,color:'#64748b',marginBottom:14}}>{loadError}</p>
        <button onClick={signOut} style={{padding:'7px 12px',borderRadius:6,border:'1px solid #e2e8f0',background:'white',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>Log ud</button>
      </div>
    </div>
  );

  const visibleData=data.filter(isVisible);
  const totalSum=data.filter(d=>d.level===1).reduce((s,d)=>s+calcSum(d,dataMap),0);
  const totalActual=data.filter(d=>d.level===1).reduce((s,d)=>s+calcActual(d,dataMap,receiptSums),0);
  const totalSumTracked=data.filter(d=>d.level===1).reduce((s,d)=>s+calcSumTracked(d,dataMap,receiptSums),0);
  const anyActual=data.filter(d=>d.level===1).some(d=>hasAnyActual(d,dataMap,receiptSums));
  const totalDiff=totalActual-totalSumTracked;

  const gridCols=isMobile?'40px 1fr 80px 30px':'52px 1.3fr 60px 48px 82px 92px 92px 72px 100px 124px';
  const selectedItem=selectedId?dataMap.get(selectedId):null;

  const LinkEditor=({item})=>{
    const[val,setVal]=useState(item.link||'');
    return(
      <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.3)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center'}}
        onClick={()=>setEditingLink(null)}>
        <div style={{background:'white',borderRadius:12,padding:20,width:400,maxWidth:'90vw',boxShadow:'0 8px 32px rgba(0,0,0,0.2)'}} onClick={e=>e.stopPropagation()}>
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:8}}>Link for "{item.desc}"</h3>
          <input value={val} onChange={e=>setVal(e.target.value)} placeholder="https://..." autoFocus
            style={{width:'100%',padding:'8px 12px',border:'1px solid #e2e8f0',borderRadius:6,fontSize:13,fontFamily:'inherit',outline:'none',marginBottom:12}}/>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            {item.link&&<button onClick={()=>{updateItem(item.id,'link','');setEditingLink(null)}} style={{padding:'6px 12px',borderRadius:6,border:'1px solid #e2e8f0',background:'white',cursor:'pointer',fontSize:12,fontFamily:'inherit',color:'#dc2626'}}>Fjern link</button>}
            <button onClick={()=>setEditingLink(null)} style={{padding:'6px 12px',borderRadius:6,border:'1px solid #e2e8f0',background:'white',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>Annuller</button>
            <button onClick={()=>{updateItem(item.id,'link',val);setEditingLink(null)}} style={{padding:'6px 12px',borderRadius:6,border:'none',background:tweaks.accentColor,color:'white',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>Gem</button>
          </div>
        </div>
      </div>
    );
  };

  const MobileRow=({item})=>{
    const {sum,actual,hasActual,diff}=getM(item.id);
    const lc=levelColors[item.level]||levelColors[5];
    const hasKids=item.children?.length>0;const isCol=collapsed.has(item.id);const isSel=selectedId===item.id;
    const indent=(item.level-1)*12;const effKat=getEffectiveKategori(item);
    const hasSC=!!item.subCalcRef;const canAddChild=item.level<MAX_LEVEL;
    return(
      <div onClick={()=>setSelectedId(item.id)} style={{padding:'8px 10px',paddingLeft:10+indent,background:isSel?'#dbeafe':lc.bg,borderBottom:'1px solid #e8ecf0'}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {hasKids?<button onClick={e=>{e.stopPropagation();toggleCollapse(item.id)}} style={{width:20,height:20,border:'none',background:'transparent',cursor:'pointer',fontSize:10,color:'#64748b',transform:isCol?'rotate(-90deg)':'rotate(0)',transition:'transform .15s',flexShrink:0}}>▼</button>
            :<span style={{width:20,flexShrink:0}}/>}
          {!isSel&&<div style={{flex:1,minWidth:0,fontWeight:lc.fw,fontSize:lc.fs,color:lc.color,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.desc}</div>}
          {isSel&&<div style={{flex:1}}/>}
          <span style={{fontWeight:700,fontSize:13,color:item.level===1?'#fff':sum<0?'#059669':'#1e293b',whiteSpace:'nowrap'}}>{fmt(sum)}</span>
          {!isSel&&item.level>=2&&<span style={{fontSize:9,fontWeight:600,color:item.level===1?'rgba(255,255,255,.8)':'#64748b',background:item.level===1?'rgba(255,255,255,.12)':'#fff',border:item.level===1?'none':'1px solid #e2e8f0',borderRadius:3,padding:'1px 5px',whiteSpace:'nowrap',flexShrink:0,minWidth:56,textAlign:'center'}}>{effKat||''}</span>}
        </div>
        {!isSel&&hasActual&&(
          <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:2,paddingLeft:26,fontSize:10}}>
            <span style={{color:item.level===1?'rgba(255,255,255,.75)':'#64748b'}}>Faktisk: <strong style={{color:item.level===1?'#fff':'#334155'}}>{fmt(actual)}</strong></span>
            <span style={{fontWeight:600,color:item.level===1?(diff>0?'#fecaca':diff<0?'#bbf7d0':'rgba(255,255,255,.7)'):(diff>0?'#dc2626':diff<0?'#16a34a':'#64748b')}}>{diff===0?'✓':(diff>0?'+':'')+fmt(Math.round(diff))}</span>
          </div>
        )}
        {isSel&&(
          <div onClick={e=>e.stopPropagation()} style={{marginTop:8,paddingLeft:26,display:'flex',flexDirection:'column',gap:6}}>
            <label style={{display:'flex',flexDirection:'column',gap:2,fontSize:11}}>
              <span style={{color:'#64748b',fontSize:9,fontWeight:600,textTransform:'uppercase'}}>Beskrivelse</span>
              <div style={{background:'white',border:'1px solid #e2e8f0',borderRadius:4,padding:'4px 6px',minHeight:26}}>
                <EditableCell id={item.id} field="desc" value={item.desc}/>
              </div>
            </label>
            {item.level>=3&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,fontSize:11,minWidth:0}}>
                <label style={{display:'flex',flexDirection:'column',gap:2}}>
                  <span style={{color:'#64748b',fontSize:9,fontWeight:600,textTransform:'uppercase'}}>Antal</span>
                  <div style={{background:'white',border:'1px solid #e2e8f0',borderRadius:4,padding:'4px 6px',minHeight:26}}>
                    <EditableCell id={item.id} field="antal" value={item.antal} numeric/>
                  </div>
                </label>
                <label style={{display:'flex',flexDirection:'column',gap:2}}>
                  <span style={{color:'#64748b',fontSize:9,fontWeight:600,textTransform:'uppercase'}}>Enhed</span>
                  <div style={{background:'white',border:'1px solid #e2e8f0',borderRadius:4,padding:'4px 6px',minHeight:26}}>
                    <SelectCell id={item.id} field="enhed" value={item.enhed} options={UNITS}/>
                  </div>
                </label>
                <label style={{display:'flex',flexDirection:'column',gap:2}}>
                  <span style={{color:'#64748b',fontSize:9,fontWeight:600,textTransform:'uppercase'}}>Pris</span>
                  <div style={{background:'white',border:'1px solid #e2e8f0',borderRadius:4,padding:'4px 6px',minHeight:26}}>
                    {hasSC?<span style={{color:tweaks.accentColor,fontSize:11}}>{fmt2(item.pris)}</span>:<EditableCell id={item.id} field="pris" value={item.pris} numeric decimals/>}
                  </div>
                </label>
              </div>
            )}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
              <label style={{display:'flex',flexDirection:'column',gap:2,fontSize:11}}>
                <span style={{color:'#94a3b8',fontSize:9,fontWeight:600,textTransform:'uppercase',display:'flex',alignItems:'center',gap:3}}>Budget <span style={{fontSize:9}}>🔒</span> <span style={{fontSize:8,fontWeight:500,textTransform:'none',color:'#cbd5e1'}}>(beregnet)</span></span>
                <div style={{background:'#f1f5f9',border:'1px dashed #cbd5e1',borderRadius:4,padding:'4px 6px',minHeight:26,fontWeight:600,color:'#64748b',cursor:'not-allowed'}}>{fmt(sum)}</div>
              </label>
              <label style={{display:'flex',flexDirection:'column',gap:2,fontSize:11}}>
                <span style={{color:'#64748b',fontSize:9,fontWeight:600,textTransform:'uppercase'}}>Faktisk brugt</span>
                <div style={{background:'white',border:'1px solid #e2e8f0',borderRadius:4,padding:'4px 6px',minHeight:26}}>
                  {item.children?.length?<span style={{color:'#64748b'}}>{fmt(actual)}</span>:<EditableCell id={item.id} field="faktisk" value={item.faktisk} numeric/>}
                </div>
              </label>
            </div>
            {hasActual&&(
              <div style={{fontSize:11,padding:'4px 6px',borderRadius:4,background:diff>0?'#fef2f2':diff<0?'#f0fdf4':'#f8fafc',color:diff>0?'#dc2626':diff<0?'#16a34a':'#64748b',fontWeight:600,display:'flex',justifyContent:'space-between'}}>
                <span>Afvigelse</span><span>{diff===0?'På budget ✓':(diff>0?'+':'')+fmt(Math.round(diff))+' kr'}</span>
              </div>
            )}
            {item.level>=2&&(
              <label style={{display:'flex',flexDirection:'column',gap:2,fontSize:11}}>
                <span style={{color:'#64748b',fontSize:9,fontWeight:600,textTransform:'uppercase'}}>Fase {!item.kategori&&effKat?'(arver: '+effKat+')':''}</span>
                <div style={{background:'white',border:'1px solid #e2e8f0',borderRadius:4,padding:'4px 6px',minHeight:26}}>
                  <SelectCell id={item.id} field="kategori" value={item.kategori} options={catOptions}/>
                </div>
              </label>
            )}
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {canMove(item.id,'up')&&<button onClick={()=>moveItem(item.id,'up')} style={{padding:'6px 10px',borderRadius:5,border:'1px solid #e2e8f0',background:'white',cursor:'pointer',fontSize:11,color:'#475569',fontFamily:'DM Sans'}}>▲ Op</button>}
              {canMove(item.id,'down')&&<button onClick={()=>moveItem(item.id,'down')} style={{padding:'6px 10px',borderRadius:5,border:'1px solid #e2e8f0',background:'white',cursor:'pointer',fontSize:11,color:'#475569',fontFamily:'DM Sans'}}>▼ Ned</button>}
              {canAddChild&&<button onClick={()=>addChild(item.id)} style={{padding:'6px 10px',borderRadius:5,border:'1px solid #e2e8f0',background:'white',cursor:'pointer',fontSize:11,fontWeight:600,color:'#475569',fontFamily:'DM Sans'}}>+ Underpost</button>}
              <button onClick={()=>setEditingLink(item.id)} style={{padding:'6px 10px',borderRadius:5,border:'1px solid #e2e8f0',background:'white',cursor:'pointer',fontSize:11,color:'#475569',fontFamily:'DM Sans'}}>{item.link?'✎ Link':'+ Link'}</button>
              {item.link&&<a href={item.link} target="_blank" rel="noopener" style={{padding:'6px 10px',borderRadius:5,border:'1px solid #e2e8f0',background:'white',fontSize:11,color:tweaks.accentColor,textDecoration:'none',fontFamily:'DM Sans'}}>↗ Åbn</a>}
              <button onClick={()=>{const msg=item.level===1?'Slet hele projektet "'+item.desc+'" inkl. alle underposter? Dette kan ikke fortrydes.':'Slet "'+item.desc+'"?';if(confirm(msg))deleteItem(item.id)}} style={{padding:'6px 10px',borderRadius:5,border:'1px solid #fecaca',background:'white',cursor:'pointer',fontSize:11,color:'#dc2626',fontFamily:'DM Sans'}}>✕ Slet</button>
              <button onClick={()=>{setEditingCell(null);setSelectedId(null);if(document.activeElement&&document.activeElement.blur)document.activeElement.blur()}} style={{padding:'6px 14px',borderRadius:5,border:'none',background:tweaks.accentColor,color:'white',cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:'DM Sans',marginLeft:'auto'}}>Færdig</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{minHeight:'100vh',background:'#f0f2f5'}}>
      {/* ═══ STICKY TOP ═══ */}
      <div ref={stickyTopRef} className="sticky-top" style={{padding:'12px 16px 0',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
        <div className="mobile-header" style={{maxWidth:1300,margin:'0 auto 8px',display:'flex',alignItems:'flex-end',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
          <div>
            <h1 style={{fontSize:isMobile?18:22,fontWeight:700,color:'#0f172a',letterSpacing:'-0.02em'}}>Projekt budget</h1>
            <p style={{color:'#64748b',fontSize:12,marginTop:1}}>
              Budget: <strong style={{color:'#0f172a',fontSize:isMobile?14:16}}>{fmt(totalSum)} kr</strong>
              {anyActual&&<span style={{marginLeft:10}}>Faktisk: <strong style={{color:'#0f172a',fontSize:isMobile?14:16}}>{fmt(totalActual)} kr</strong> <span style={{color:totalDiff>0?'#dc2626':totalDiff<0?'#16a34a':'#64748b',fontWeight:600}}>({totalDiff===0?'på budget':(totalDiff>0?'+':'')+fmt(Math.round(totalDiff))+' kr'})</span></span>}
            </p>
          </div>
          <div className="mobile-controls" style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <div style={{display:'flex',alignItems:'center',gap:4,background:'white',padding:'4px 10px',borderRadius:7,boxShadow:'0 1px 2px rgba(0,0,0,0.06)'}}>
              <span style={{fontSize:10,fontWeight:600,color:'#64748b'}}>Niveau</span>
              {[1,2,3,4,5].map(l=><button key={l} onClick={()=>setDetailLevel(l)} style={{width:26,height:26,borderRadius:4,border:'none',cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:'DM Sans',background:detailLevel===l?tweaks.accentColor:'#f1f5f9',color:detailLevel===l?'#fff':'#64748b',transition:'all .15s'}}>{l}</button>)}
            </div>
            <button className="desktop-only" onClick={copyToClipboard} style={{padding:'5px 10px',borderRadius:6,border:'1px solid #e2e8f0',background:'white',cursor:'pointer',fontSize:10,fontWeight:600,color:'#475569',fontFamily:'DM Sans'}}>📋 Kopiér</button>
            <div style={{display:'flex',alignItems:'center',gap:6,background:'white',padding:'4px 8px',borderRadius:7,boxShadow:'0 1px 2px rgba(0,0,0,0.06)'}}>
              <span title={userEmail} style={{fontSize:10,color:'#64748b',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{userEmail}</span>
              <button onClick={signOut} style={{padding:'3px 8px',borderRadius:4,border:'1px solid #e2e8f0',background:'white',cursor:'pointer',fontSize:10,fontWeight:600,color:'#475569',fontFamily:'DM Sans'}}>Log ud</button>
            </div>
          </div>
        </div>
        <div style={{maxWidth:1300,margin:'0 auto',display:'flex',gap:2}}>
          {[['budget','Budget'],['kategorier','Faser'],['subcalc','Underberegninger'],['kob','Køb']].map(([k,l])=>(
            <button key={k} className="tab-btn" onClick={()=>setActiveTab(k)} style={{background:activeTab===k?'white':'#e2e8f0',color:activeTab===k?'#0f172a':'#64748b',fontSize:isMobile?11:12}}>{l}</button>
          ))}
        </div>
        {activeTab==='budget'&&(
          <div style={{maxWidth:1300,margin:'0 auto'}}>
            <div style={{padding:'4px 10px 6px',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <span style={{fontSize:11,color:'#64748b'}}>🔍</span>
              <input value={budgetSearch} onChange={e=>setBudgetSearch(e.target.value)} placeholder="Søg i beskrivelser…"
                style={{flex:1,maxWidth:360,padding:'5px 9px',border:'1px solid #e2e8f0',borderRadius:6,fontSize:12,fontFamily:'inherit',outline:'none',background:'white'}}/>
              {budgetSearch&&<button onClick={()=>setBudgetSearch('')} style={{padding:'4px 8px',border:'none',background:'transparent',color:'#64748b',cursor:'pointer',fontSize:11,fontFamily:'inherit'}}>✕ Ryd</button>}
              {searchInfo&&(
                <button onClick={()=>setSearchLeavesOnly(v=>!v)} title={searchLeavesOnly?'Vis hierarki (matches + parents)':'Vis kun de dybeste matches uden parents'}
                  style={{padding:'5px 10px',borderRadius:6,border:'1px solid '+(searchLeavesOnly?tweaks.accentColor:'#e2e8f0'),background:searchLeavesOnly?tweaks.accentColor:'white',color:searchLeavesOnly?'white':'#475569',cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:'inherit'}}>{searchLeavesOnly?'📋 Kun matches':'🌳 Hierarki'}</button>
              )}
              {searchInfo&&(()=>{
                // Sum based on current mode:
                //  - leaves: sum the deepest matches (no double-counting since they share no descendants)
                //  - tree: sum top-most matches (their subtrees include their matching descendants)
                let summed;
                if(searchLeavesOnly){
                  summed=[...searchInfo.leaves];
                }else{
                  const directSet=searchInfo.direct;
                  summed=[...directSet].filter(id=>{
                    let cur=dataMap.get(id);
                    while(cur?.parent){cur=dataMap.get(cur.parent);if(!cur)break;if(directSet.has(cur.id))return false;}
                    return true;
                  });
                }
                let s=0,a=0;
                summed.forEach(id=>{const m=metricsById.get(id);if(m){s+=m.sum;a+=m.actual;}});
                const hasA=summed.some(id=>metricsById.get(id)?.hasActual);
                return(
                  <span style={{marginLeft:'auto',padding:'5px 12px',background:'#dbeafe',borderRadius:6,fontSize:12,color:'#0f172a',whiteSpace:'nowrap'}}>
                    <span style={{color:'#64748b',fontSize:11,marginRight:6}}>Filtreret sum:</span>
                    <strong>{fmt(s)} kr</strong>
                    {hasA&&<span style={{marginLeft:8,color:'#475569',fontSize:11}}>· faktisk {fmt(a)} kr</span>}
                    <span style={{color:'#94a3b8',marginLeft:6,fontSize:10}}>· {searchInfo.direct.size} match{searchLeavesOnly&&searchInfo.leaves.size!==searchInfo.direct.size?' ('+searchInfo.leaves.size+' uden parents)':''}</span>
                  </span>
                );
              })()}
            </div>
            {!isMobile&&<div style={{display:'grid',gridTemplateColumns:gridCols,padding:'7px 10px',background:'#1e293b',color:'#cbd5e1',fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em',gap:'0 12px'}}>
              <span>Kode</span><span>Beskrivelse</span><span style={{textAlign:'right'}}>Antal</span><span>Enhed</span><span style={{textAlign:'right'}}>Enhedspris</span><span style={{textAlign:'right'}}>Budget</span><span style={{textAlign:'right'}}>Faktisk</span><span style={{textAlign:'right'}}>Afvigelse</span><span>Kategori</span><span/>
            </div>}
          </div>
        )}
      </div>

      {/* ═══ KØB TAB — købsjournal + kvitteringer ═══ */}
      {activeTab==='kob'&&(()=>{
        // Flatten every receipt line, plus manual `faktisk` entries from the budget tree,
        // into a single journal array.
        const allLines=[];
        const storeFilter=kobStoreFilter||'';
        receipts.forEach(r=>{
          if(storeFilter&&(r.store||'').trim()!==storeFilter)return;
          (r.lines||[]).forEach(l=>{
            const linked=l.linkedId?dataMap.get(l.linkedId):null;
            allLines.push({
              key:'r-'+r.id+'-'+l.id,
              source:'receipt',
              receiptId:r.id,
              store:r.store||'',
              date:r.date||'',
              desc:l.desc||'',
              amount:Number(l.amount)||0,
              linkedId:l.linkedId||'',
              linkedDesc:linked?linked.desc:'',
              created:r.created||0,
            });
          });
        });
        // Manual-faktisk entries have no store, so they're hidden when a store filter is active.
        if(!storeFilter){
          data.forEach(d=>{
            if(d.children?.length)return;
            if(d.faktisk==null||d.faktisk==='')return;
            const amount=Number(d.faktisk)||0;
            if(!amount)return;
            allLines.push({
              key:'f-'+d.id,
              source:'manual-faktisk',
              itemId:d.id,
              store:'',
              date:'',
              desc:d.desc||'',
              amount,
              linkedId:d.id,
              linkedDesc:d.desc||'',
              created:0,
            });
          });
        }
        allLines.sort((a,b)=>{
          if(a.date!==b.date)return (b.date||'').localeCompare(a.date||'');
          return (b.created||0)-(a.created||0);
        });
        const [filter,setFilterLocal]=[oversigtFilter,setOversigtFilter];
        const filtered=allLines.filter(l=>{
          if(filter==='linked')return !!l.linkedId;
          if(filter==='unlinked')return !l.linkedId;
          return true;
        });
        const totalAll=allLines.reduce((s,l)=>s+l.amount,0);
        const totalLinked=allLines.filter(l=>l.linkedId).reduce((s,l)=>s+l.amount,0);
        const totalUnlinked=totalAll-totalLinked;
        const nReceipts=receipts.length;
        const nManual=allLines.filter(l=>l.source==='manual-faktisk').length;

        return(
          <div style={{maxWidth:1300,margin:'0 auto',background:'white',borderRadius:'0 12px 12px 12px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',padding:isMobile?12:20}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10,marginBottom:14}}>
              <div>
                <h2 style={{fontSize:17,fontWeight:700,color:'#0f172a'}}>Køb</h2>
                <p style={{fontSize:12,color:'#64748b',marginTop:2}}>Kvitteringer og manuelle køb — og hvor de er koblet på budgettet.</p>
              </div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                <label style={{padding:'7px 12px',borderRadius:7,border:'none',background:tweaks.accentColor,color:'white',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'DM Sans',display:'inline-flex',alignItems:'center',gap:6}}>
                  📷 {isMobile?'Tag':'Scan'}
                  <input type="file" accept="image/*" capture="environment" style={{display:'none'}}
                    onChange={e=>{addReceiptFromFile(e.target.files?.[0]);e.target.value='';}}/>
                </label>
                <label style={{padding:'7px 12px',borderRadius:7,border:'1px solid '+tweaks.accentColor,background:'white',color:tweaks.accentColor,cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'DM Sans',display:'inline-flex',alignItems:'center',gap:6}}>
                  📁 Upload
                  <input type="file" accept="image/*" style={{display:'none'}}
                    onChange={e=>{addReceiptFromFile(e.target.files?.[0]);e.target.value='';}}/>
                </label>
                <button onClick={addManualReceipt}
                  style={{padding:'7px 12px',borderRadius:7,border:'1px solid #e2e8f0',background:'white',color:'#475569',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>+ Manuelt</button>
              </div>
            </div>

            {/* Summary strip */}
            <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr 1fr':'repeat(3,1fr)',gap:isMobile?8:12,marginBottom:16}}>
              <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:10,padding:isMobile?10:14}}>
                <div style={{fontSize:10,fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.05em'}}>Total købt</div>
                <div style={{fontSize:isMobile?16:20,fontWeight:700,color:'#0f172a',marginTop:4}}>{fmt(totalAll)} kr</div>
                <div style={{fontSize:10,color:'#94a3b8',marginTop:3}}>{allLines.length} linje{allLines.length!==1?'r':''} · {nReceipts} kvittering{nReceipts!==1?'er':''}{nManual>0?' · '+nManual+' manuel':''}</div>
              </div>
              <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:10,padding:isMobile?10:14}}>
                <div style={{fontSize:10,fontWeight:600,color:'#166534',textTransform:'uppercase',letterSpacing:'.05em'}}>Koblet til budget</div>
                <div style={{fontSize:isMobile?16:20,fontWeight:700,color:'#166534',marginTop:4}}>{fmt(totalLinked)} kr</div>
                <div style={{fontSize:10,color:'#16a34a',marginTop:3}}>{allLines.filter(l=>l.linkedId).length} linje{allLines.filter(l=>l.linkedId).length!==1?'r':''}</div>
              </div>

            {/* Liste view — journal */}
            {kobView==='liste'&&(allLines.length===0?(

                {/* Grouped by receipt */}
                {(()=>{
                  const grps=[];

                  filtered.forEach(l=>{
                    if(l.source==='manual-faktisk'){grps.push({kind:'manual',line:l});return;}

                                <span style={{color:'#0369a1',fontWeight:700,fontSize:12,display:'flex',alignItems:'center',gap:6}}>

                              </div>
                              <span style={{fontWeight:700,fontSize:13,color:'#0f172a',whiteSpace:'nowrap'}}>{fmt(groupTotal)} kr</span>
                            </div>
                            <div>
                              {g.lines.map((l,li)=>(
                                <div key={l.key} onClick={()=>setViewReceipt(r.id)}
                                  style={{display:'grid',gridTemplateColumns:lineCols,gap:10,padding:'6px 12px 6px 20px',alignItems:'center',fontSize:12,borderBottom:li<g.lines.length-1?'1px solid #f8fafc':'none',cursor:'pointer',transition:'background .1s'}}
                                  onMouseEnter={e=>e.currentTarget.style.background='#fafbfc'}
                                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                                  <span style={{color:'#475569',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.desc||<span style={{color:'#cbd5e1',fontStyle:'italic'}}>Ingen beskrivelse</span>}</span>
                                  {!isMobile&&<span style={{textAlign:'right',fontWeight:600,color:'#334155'}}>{fmt(l.amount)} kr</span>}
                                  {l.linkedId?(
                                    <span style={{color:tweaks.accentColor,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={l.linkedId+' '+l.linkedDesc}>
                                      <span style={{fontFamily:'monospace',fontSize:10,color:'#94a3b8',marginRight:4}}>{l.linkedId}</span>{l.linkedDesc}
                                    </span>
                                  ):(
                                    <span style={{color:'#b45309',fontWeight:600,background:'#fffbeb',padding:'2px 8px',borderRadius:4,border:'1px solid #fde68a',fontSize:11,justifySelf:'start'}}>⚠ Ikke koblet</span>
                                  )}
                                  {isMobile&&<span style={{gridColumn:'1 / -1',textAlign:'right',fontWeight:700,color:'#0f172a',fontSize:12}}>{fmt(l.amount)} kr</span>}
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}

                {/* Footer total for the filtered set */}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',marginTop:10,borderTop:'2px solid #1e293b'}}>
                  <span style={{fontSize:12,color:'#64748b'}}>{filtered.length} linje{filtered.length!==1?'r':''} vist</span>
                  <span style={{fontSize:15,fontWeight:700,color:'#0f172a'}}>Sum: {fmt(filtered.reduce((s,l)=>s+l.amount,0))} kr</span>
                </div>
              </>
            ))}

            {/* Galleri view — kvitterings-kort */}
            {kobView==='galleri'&&(()=>{
              const galleryReceipts=kobStoreFilter?receipts.filter(r=>(r.store||'').trim()===kobStoreFilter):receipts;
              if(galleryReceipts.length===0){

                  <div style={{padding:'48px 20px',textAlign:'center',color:'#94a3b8',fontSize:13,border:'2px dashed #e2e8f0',borderRadius:10}}>

      {/* ═══ BUDGET TAB ═══ */}
